<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আরবি শব্দভাণ্ডার ও অনুশীলন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Hind Siliguri', 'Cairo', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a); 
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }
        .neon-glow-success {
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-12">

    <nav class="glass-card sticky top-0 z-50 border-b border-slate-700/50 mb-8">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white neon-glow">
                    <i class="fa-solid fa-book-quran text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-wide bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">Arabic Vocab Master</h1>
            </div>
            <div class="flex gap-4">
                <button onclick="switchTab('practice')" id="tab-practice" class="px-4 py-2 rounded-lg bg-indigo-600 text-white font-medium transition-all">
                    <i class="fa-solid fa-layer-group mr-1"></i> অনুশীলন
                </button>
                <button onclick="switchTab('quiz')" id="tab-quiz" class="px-4 py-2 rounded-lg text-slate-400 hover:text-slate-200 font-medium transition-all">
                    <i class="fa-solid fa-graduation-cap mr-1"></i> পরীক্ষা দিন
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4">
        
        <div id="practice-section" class="space-y-8">
            <div class="glass-card rounded-2xl p-6 neon-glow">
                <h2 class="text-lg font-bold mb-4 text-indigo-400 flex items-center gap-2">
                    <i class="fa-solid fa-plus-circle"></i> নতুন শব্দ যুক্ত করুন
                </h2>
                <form id="word-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1">আরবি শব্দ (Arabic)</label>
                        <input type="text" id="arabic-input" dir="rtl" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-xl text-right font-bold text-cyan-400 focus:outline-none focus:border-indigo-500" placeholder="العربية" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1">উচ্চারণ (Pronunciation)</label>
                        <input type="text" id="pronounce-input" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-indigo-500" placeholder="যেমন: আনা" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1">বাংলা অর্থ (Meaning)</label>
                        <div class="flex gap-2">
                            <input type="text" id="meaning-input" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-indigo-500" placeholder="যেমন: আমি" required>
                            <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 rounded-xl font-bold transition-all whitespace-nowrap">
                                <i class="fa-solid fa-save mr-1"></i> সেভ
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div>
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-slate-300">
                    <i class="fa-solid fa-list-check text-indigo-500"></i> আপনার শব্দভাণ্ডার 
                    <span id="word-count" class="text-sm bg-slate-800 text-slate-400 px-3 py-1 rounded-full">০ টি শব্দ</span>
                </h2>
                <div id="words-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                    <div class="col-span-full text-center py-12 text-slate-500">শব্দ লোড হচ্ছে...</div>
                </div>
            </div>
        </div>

        <div id="quiz-section" class="hidden max-w-2xl mx-auto">
            <div class="glass-card rounded-2xl p-8 neon-glow-success text-center relative overflow-hidden">
                
                <div id="quiz-box">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-xs bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-3 py-1 rounded-full font-bold">পরীক্ষা চলছে</span>
                        <span id="quiz-progress" class="text-sm text-slate-400 font-medium">প্রশ্ন: ০/০</span>
                    </div>

                    <div class="py-8">
                        <h3 id="quiz-question-arabic" dir="rtl" class="text-5xl font-bold text-cyan-400 mb-3 tracking-wide">...</h3>
                        <p id="quiz-question-pronounce" class="text-slate-400 italic text-lg">...</p>
                    </div>

                    <div id="quiz-options" class="grid grid-cols-1 gap-3 mt-6">
                        </div>

                    <div id="quiz-feedback" class="mt-6 text-lg font-bold hidden"></div>
                </div>

                <div id="quiz-result" class="hidden py-8">
                    <div class="text-6xl text-amber-400 mb-4"><i class="fa-solid fa-trophy"></i></div>
                    <h3 class="text-2xl font-bold mb-2">পরীক্ষা শেষ!</h3>
                    <p id="result-text" class="text-slate-300 mb-6">আপনার স্কোর এখানে দেখাবে</p>
                    <button onclick="startQuiz()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-bold transition-all">
                        <i class="fa-solid fa-rotate-left mr-1"></i> আবার চেষ্টা করুন
                    </button>
                </div>

            </div>
        </div>

    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // --- ফায়ারবেস কনফিগারেশন ---
        // TODO: আপনার নিজের Firebase Project-এর Web Config ডেটা এখানে বসান
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // ফায়ারবেস ইনিশিয়ালাইজ করা
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dbRef = database.ref('arabic_words');

        // গ্লোবাল ভেরিয়েবল
        let allWords = [];
        let currentQuizIndex = 0;
        let score = 0;
        let quizWords = [];

        // --- ট্যাব পরিবর্তনের লজিক ---
        function switchTab(tab) {
            if (tab === 'practice') {
                document.getElementById('practice-section').classList.remove('hidden');
                document.getElementById('quiz-section').classList.add('hidden');
                document.getElementById('tab-practice').className = "px-4 py-2 rounded-lg bg-indigo-600 text-white font-medium transition-all";
                document.getElementById('tab-quiz').className = "px-4 py-2 rounded-lg text-slate-400 hover:text-slate-200 font-medium transition-all";
            } else {
                document.getElementById('practice-section').classList.add('hidden');
                document.getElementById('quiz-section').classList.remove('hidden');
                document.getElementById('tab-quiz').className = "px-4 py-2 rounded-lg bg-emerald-600 text-white font-medium transition-all";
                document.getElementById('tab-practice').className = "px-4 py-2 rounded-lg text-slate-400 hover:text-slate-200 font-medium transition-all";
                startQuiz();
            }
        }

        // --- নতুন শব্দ সেভ করার লজিক ---
        document.getElementById('word-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const arabic = document.getElementById('arabic-input').value.trim();
            const pronounce = document.getElementById('pronounce-input').value.trim();
            const meaning = document.getElementById('meaning-input').value.trim();

            if (arabic && pronounce && meaning) {
                const newWordRef = dbRef.push();
                newWordRef.set({
                    id: newWordRef.key,
                    arabic: arabic,
                    pronounce: pronounce,
                    meaning: meaning,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                }).then(() => {
                    document.getElementById('word-form').reset();
                }).catch(err => alert("সেভ করতে সমস্যা হয়েছে: " + err.message));
            }
        });

        // --- রিয়েলটাইম ডেটা রিড ও রেন্ডার লজিক ---
        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            allWords = [];
            const container = document.getElementById('words-container');
            const countSpan = document.getElementById('word-count');

            if (!data) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500">কোনো শব্দ পাওয়া যায়নি। নতুন শব্দ যোগ করুন!</div>`;
                countSpan.innerText = "০ টি শব্দ";
                return;
            }

            container.innerHTML = '';
            for (let key in data) {
                allWords.push(data[key]);
            }

            // নতুন যুক্ত করা শব্দগুলো সবার আগে দেখানোর জন্য সর্ট করা
            allWords.sort((a, b) => b.timestamp - a.timestamp);
            countSpan.innerText = `${allWords.length} টি শব্দ`;

            allWords.forEach(word => {
                const card = document.createElement('div');
                card.className = "glass-card p-5 rounded-xl flex flex-col justify-between hover:border-slate-500 transition-all relative group";
                card.innerHTML = `
                    <button onclick="deleteWord('${word.id}')" class="absolute top-3 right-3 text-slate-500 hover:text-rose-400 opacity-0 group-hover:opacity-100 transition-all">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                    <div class="text-right mb-2">
                        <h3 dir="rtl" class="text-3xl font-bold text-cyan-400 tracking-wide">${word.arabic}</h3>
                    </div>
                    <div class="border-t border-slate-700/50 pt-2 mt-2">
                        <p class="text-xs font-semibold text-indigo-400 uppercase tracking-wider">উচ্চারণ</p>
                        <p class="text-slate-200 font-medium mb-1">${word.pronounce}</p>
                        <p class="text-xs font-semibold text-emerald-400 uppercase tracking-wider">অর্থ</p>
                        <p class="text-slate-300 font-semibold">${word.meaning}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        });

        // --- শব্দ ডিলিট করার লজিক ---
        function deleteWord(id) {
            if (confirm("আপনি কি নিশ্চিতভাবে এই শব্দটি মুছে ফেলতে চান?")) {
                dbRef.child(id).remove();
            }
        }

        // --- কুইজ/পরীক্ষা সিস্টেম লজিক ---
        function startQuiz() {
            if (allWords.length < 4) {
                document.getElementById('quiz-box').classList.add('hidden');
                document.getElementById('quiz-result').classList.remove('hidden');
                document.getElementById('result-text').innerText = "পরীক্ষা শুরু করার জন্য কমপক্ষে ৪টি শব্দ ডাটাবেজে যুক্ত থাকতে হবে।";
                return;
            }

            // শব্দগুলোকে র‍্যান্ডমাইজ বা ওলটপালট করা
            quizWords = [...allWords].sort(() => 0.5 - Math.random()).slice(0, 10); // সর্বোচ্চ ১০টি শব্দের পরীক্ষা হবে
            currentQuizIndex = 0;
            score = 0;

            document.getElementById('quiz-box').classList.remove('hidden');
            document.getElementById('quiz-result').classList.add('hidden');
            
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('quiz-feedback').classList.add('hidden');
            const currentWord = quizWords[currentQuizIndex];
            
            document.getElementById('quiz-progress').innerText = `প্রশ্ন: ${currentQuizIndex + 1}/${quizWords.length}`;
            document.getElementById('quiz-question-arabic').innerText = currentWord.arabic;
            document.getElementById('quiz-question-pronounce').innerText = `(${currentWord.pronounce})`;

            // অপশন তৈরি করা (১টি সঠিক উত্তর এবং ৩টি ভুল উত্তর র‍্যান্ডমলি নেওয়া)
            let options = [currentWord.meaning];
            let wrongOptions = allWords.filter(w => w.meaning !== currentWord.meaning);
            wrongOptions.sort(() => 0.5 - Math.random());
            
            for (let i = 0; i < Math.min(3, wrongOptions.length); i++) {
                options.push(wrongOptions[i].meaning);
            }
            // অপশনগুলোকে আবার ওলটপালট করা
            options.sort(() => 0.5 - Math.random());

            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';

            options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left bg-slate-800/60 hover:bg-slate-700/80 border border-slate-700 p-4 rounded-xl font-medium transition-all flex justify-between items-center";
                btn.innerHTML = `<span>${option}</span> <i class="fa-regular fa-circle text-slate-500"></i>`;
                btn.onclick = () => checkAnswer(btn, option, currentWord.meaning);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, selectedOption, correctOption) {
            const buttons = document.getElementById('quiz-options').getElementsByTagName('button');
            
            // সব বোতামের ক্লিক ডিজেবল করা
            for (let btn of buttons) {
                btn.disabled = true;
                const optText = btn.querySelector('span').innerText;
                if (optText === correctOption) {
                    btn.className = "w-full text-left bg-emerald-500/20 border-emerald-500 p-4 rounded-xl font-medium transition-all flex justify-between items-center text-emerald-400";
                    btn.querySelector('i').className = "fa-solid fa-circle-check text-emerald-500";
                }
            }

            const feedback = document.getElementById('quiz-feedback');
            feedback.classList.remove('hidden');

            if (selectedOption === correctOption) {
                score++;
                selectedBtn.className = "w-full text-left bg-emerald-500/20 border-emerald-500 p-4 rounded-xl font-medium transition-all flex justify-between items-center text-emerald-400";
                selectedBtn.querySelector('i').className = "fa-solid fa-circle-check text-emerald-500";
                feedback.innerHTML = `<span class="text-emerald-400"><i class="fa-solid fa-face-smile"></i> চমৎকার! সঠিক উত্তর।</span>`;
            } else {
                selectedBtn.className = "w-full text-left bg-rose-500/20 border-rose-500 p-4 rounded-xl font-medium transition-all flex justify-between items-center text-rose-400";
                selectedBtn.querySelector('i').className = "fa-solid fa-circle-xmark text-rose-500";
                feedback.innerHTML = `<span class="text-rose-400"><i class="fa-solid fa-face-frown"></i> ভুল উত্তর! সঠিক অর্থ: <b>${correctOption}</b></span>`;
            }

            // ১.৫ সেকেন্ড পর পরবর্তী প্রশ্নে যাওয়া
            setTimeout(() => {
                currentQuizIndex++;
                if (currentQuizIndex < quizWords.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 1500);
        }

        function showResult() {
            document.getElementById('quiz-box').classList.add('hidden');
            document.getElementById('quiz-result').classList.remove('hidden');
            
            const percentage = Math.round((score / quizWords.length) * 100);
            document.getElementById('result-text').innerHTML = `আপনি <b>${quizWords.length}</b> টি শব্দের মধ্যে <b>${score}</b> টির সঠিক উত্তর দিয়েছেন।<br><span class="text-indigo-400 font-bold text-xl">স্কোর: ${percentage}%</span>`;
        }
    </script>
</body>
</html>
